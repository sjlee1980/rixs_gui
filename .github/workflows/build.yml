name: Build RIXS GUI Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # We force the Linux runner to use 20.04 for maximum GLIBC compatibility
    runs-on: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu-20.04' || matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 matplotlib "numpy<2.0"

    - name: Install Linux GUI Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libxcb-cursor0 xvfb

    - name: Build with PyInstaller
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          xvfb-run pyinstaller --name "RIXS_Analyzer" --onefile --windowed --collect-submodules PyQt6 rixs_gui_matplotlib.py
        else
          pyinstaller --name "RIXS_Analyzer" --onefile --windowed --collect-submodules PyQt6 rixs_gui_matplotlib.py
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RIXS_Analyzer-${{ matrix.os }}
        path: dist/RIXS_Analyzer*