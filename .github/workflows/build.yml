name: Build and Release RIXS Analyzer

# This workflow triggers automatically when you push a version tag (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Highly stable version for PyInstaller

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller numpy matplotlib PyQt6

    - name: Build with PyInstaller
      run: |
        pyinstaller --name "RIXS_Analyzer" --onefile --windowed rixs_gui_matplotlib.py

    # macOS creates a .app directory which GitHub Actions can corrupt if not zipped
    - name: Zip macOS App Bundle
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        zip -r ../RIXS_Analyzer_macOS.zip RIXS_Analyzer.app

    # Move Windows exe out of dist folder and rename it clearly
    - name: Prepare Windows Executable
      if: matrix.os == 'windows-latest'
      run: Copy-Item -Path "dist\RIXS_Analyzer.exe" -Destination "RIXS_Analyzer_Windows.exe"

    # Move Linux executable out of dist folder and rename it clearly
    - name: Prepare Linux Executable
      if: matrix.os == 'ubuntu-latest'
      run: mv dist/RIXS_Analyzer RIXS_Analyzer_Linux

    # Upload everything to the GitHub Release page automatically
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          RIXS_Analyzer_macOS.zip
          RIXS_Analyzer_Windows.exe
          RIXS_Analyzer_Linux